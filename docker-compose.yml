version: "3.8"

services:

  # ── MySQL Database ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: taskmanager_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: taskdb
    volumes:
      - mysql_data:/var/lib/mysql          # Data persists across restarts
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql  # Auto-setup
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ─────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: taskmanager_api
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: taskdb
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy   # Wait for DB to be ready

  # ── React Frontend ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: taskmanager_ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

# ── Persistent Volume ───────────────────────────────────────────
volumes:
  mysql_data:
